name: Deploy to GitHub Pages

# 触发条件：推送到 main 分支时自动执行
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 权限配置：允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 部署环境
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # 对应 next.config.ts 里的 distDir

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
